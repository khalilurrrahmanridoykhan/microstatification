server {
    listen 9200;
    server_name _;
    client_max_body_size 50M;

    # Dedicated submit workers for this clone
    location ~ ^/api/forms/[0-9]+/submit/?$ {
        proxy_pass http://127.0.0.1:9212;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Main API for this clone
    location /api/ {
        proxy_pass http://127.0.0.1:9202/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    location /static/ {
        alias /var/www/ComMicPlanV2_clone_2_Mar/backend/static/;
    }

    location /media/ {
        alias /var/www/ComMicPlanV2_clone_2_Mar/backend/media/;
    }

    location /malaria/ {
        alias /var/www/ComMicPlanV2_clone_2_Mar/Malaria-Reporting-System/dist/;
        try_files $uri $uri/ /malaria/index.html;
    }

    location / {
        root /var/www/ComMicPlanV2_clone_2_Mar/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
