# Early Warning System - Public Frontend
server {
    listen 443 ssl;

    server_name earlywaringsystem.commicplan.com;

    ssl_certificate /etc/letsencrypt/live/earlywaringsystem.commicplan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/earlywaringsystem.commicplan.com/privkey.pem;

    root /opt/EarlyWaringSystem/frontend/dist;
    index index.html;

    # Serve frontend files
    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (if needed)
    location /static/ {
        alias /opt/EarlyWaringSystem/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (if needed)
    location /media/ {
        alias /opt/EarlyWaringSystem/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Early Warning System - Admin Interface
server {
    listen 443 ssl;

    server_name earlywaringsystemadmin.commicplan.com;

    ssl_certificate /etc/letsencrypt/live/earlywaringsystem.commicplan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/earlywaringsystem.commicplan.com/privkey.pem;

    # Proxy all requests to the Django backend (admin)
    location / {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (if needed)
    location /static/ {
        alias /opt/EarlyWaringSystem/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (if needed)
    location /media/ {
        alias /opt/EarlyWaringSystem/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTP to HTTPS redirect for Early Warning System domains
server {
    listen 80;
    server_name earlywaringsystem.commicplan.com earlywaringsystemadmin.commicplan.com;
    return 301 https://$server_name$request_uri;
}
