services:
  db:
    image: postgres:16-alpine
    env_file:
      - docker.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: ridoykhan/commicplanv2:backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - docker.env
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    image: ridoykhan/commicplanv2:backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - docker.env
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "backend", "worker", "-l", "info"]
    restart: unless-stopped

  nginx:
    image: ridoykhan/commicplanv2:web
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "8080:80"
    volumes:
      - static_data:/static
      - media_data:/media
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  static_data:
  media_data:
